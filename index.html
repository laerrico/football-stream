<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peak Streams - Live Football Streams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { main: '#024f79', danger: '#df282a', accent: '#18cad8' } } }
        }
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>

<body :class="darkMode ? 'bg-gray-900 text-gray-100' : 'bg-gray-50 text-gray-900'">
    <div id="app" class="flex flex-col min-h-screen">

        <header :class="darkMode ? 'bg-gray-800 text-gray-100 shadow-md' : 'bg-white text-gray-900 shadow-md'" class="sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
                <a href="/">
                    <h1 class="text-2xl font-bold text-main">Peak Streams</h1>
                </a>
            </div>
        </header>

        <main :class="darkMode ? 'bg-gray-900 text-gray-100' : 'bg-gray-50 text-gray-900'" class="flex-1 max-w-6xl mx-auto p-4 w-full">
            
            <div>
                <div class="flex justify-center mb-4">
                    <button @click="tab='live'" :class="tab==='live' ? 'bg-main text-white' : 'bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-200'" class="px-4 py-2 rounded-l-lg hover:bg-main hover:text-white transition">Live</button>
                    <button @click="tab='upcoming'" :class="tab==='upcoming' ? 'bg-main text-white' : 'bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-200'" class="px-4 py-2 rounded-r-lg hover:bg-main hover:text-white transition">Upcoming</button>
                </div>

                <div v-if="filteredMatches.length">
                    <div v-for="(matches, league) in groupedMatches" :key="league" class="mb-6">
                        <h2 class="text-xl font-bold mb-2 border-b pb-1 border-main">{{ league }}</h2>
                        <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
                            <div v-for="match in paginated(matches)" :key="match.id" class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden cursor-pointer hover:scale-105 transition-transform relative" @click="openMatch(match.id)">
                                <div class="relative">
                                    <img :src="match.poster" :alt="match.title" class="w-full h-48 object-cover rounded-t-xl">
                                    <div class="absolute top-2 left-2 px-2 py-1 rounded text-xs font-bold text-white" :class="match.date <= Date.now() ? 'bg-danger' : 'bg-main'">
                                        {{ matchStatusText(match) }}
                                    </div>
                                    <div class="absolute bottom-0 left-0 right-0 bg-main bg-opacity-70 p-2 text-white font-semibold text-lg truncate">
                                        {{ match.title }}
                                    </div>
                                </div>
                                <div class="p-4 flex justify-between items-center">
                                    <div class="flex items-center space-x-2">
                                        <img :src="match.teams.home.badge" class="w-10 h-10 rounded-full border border-gray-200 object-contain">
                                        <span class="font-medium truncate">{{ match.teams.home.name }}</span>
                                    </div>
                                    <span class="font-bold text-gray-700 dark:text-gray-200">VS</span>
                                    <div class="flex items-center space-x-2">
                                        <span class="font-medium truncate">{{ match.teams.away.name }}</span>
                                        <img :src="match.teams.away.badge" class="w-10 h-10 rounded-full border border-gray-200 object-contain">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <p v-else class="text-center text-gray-500 dark:text-gray-400 mt-10">No matches found.</p>
            </div>
        </main>

        <div v-if="selectedMatch" class="fixed inset-0 bg-black bg-opacity-95 flex flex-col items-center justify-center z-50 p-4">
            <button @click="closeModal" class="absolute top-4 right-4 text-white text-4xl font-bold hover:text-red-600 transition">&times;</button>
            <div class="text-center mb-4">
                <h2 class="text-2xl font-bold text-white">{{ selectedMatch.title }}</h2>
            </div>
            <div v-if="streamUrl" class="w-full max-w-5xl h-[70vh] rounded-lg overflow-hidden shadow-lg">
                <iframe :src="streamUrl" class="w-full h-full" frameborder="0" allowfullscreen allow="autoplay"></iframe>
            </div>
        </div>

    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    matches: [],
                    selectedMatch: null,
                    streamUrl: '',
                    tab: 'live',
                    currentPageNum: 1,
                    perPage: 6,
                    searchQuery: '',
                    selectedLeague: '',
                    darkMode: localStorage.getItem('darkMode') === 'true'
                }
            },
            mounted() {
                this.fetchMatches();
            },
            computed: {
                filteredMatches() {
                    const now = Date.now();
                    let result = this.matches.filter(match => match.popular)
                        .filter(match => this.tab === 'live' ? match.date <= now : match.date > now);
                    return result.sort((a, b) => a.date - b.date);
                },
                groupedMatches() {
                    const grouped = {};
                    this.filteredMatches.forEach(match => {
                        const league = match.league || 'Soccer';
                        if (!grouped[league]) grouped[league] = [];
                        grouped[league].push(match);
                    });
                    return grouped;
                }
            },
            methods: {
                async fetchMatches() {
                    try {
                        const res = await fetch('https://api.sportsrc.org/?data=matches&category=football&apikey=aa42220558264a92cff489a6719b4bf5');
                        const data = await res.json();
                        if (data.success) this.matches = data.data;
                    } catch (err) {
                        console.error('Failed to fetch matches:', err);
                    }
                },
                paginated(matches) { const start = (this.currentPageNum - 1) * this.perPage; return matches.slice(start, start + this.perPage); },
                async openMatch(matchId) {
                    try {
                        const res = await fetch(`https://api.sportsrc.org/?data=detail&category=football&id=${matchId}&apikey=aa42220558264a92cff489a6719b4bf5`);
                        const data = await res.json();

                        console.log("Stream Data:", data.data.sources);
                        
                        if (data.success && data.data.sources.length) {
                            this.selectedMatch = data.data;
                            const lowestStream = data.data.sources[data.data.sources.length - 1];
                            this.streamUrl = lowestStream.embedUrl + '?autoplay=1';
                        }
                    } catch (err) { console.error('Failed to fetch stream:', err); }
                },
                closeModal() { this.selectedMatch = null; this.streamUrl = ''; },
                matchStatusText(match) { return match.date <= Date.now() ? 'LIVE' : 'UPCOMING'; }
            }
        }).mount('#app');
    </script>
</body>
</html>
